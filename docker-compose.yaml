services:

  db:
    image: postgres:15 #pre built image, no dockerfile needed
    environment:
      POSTGRES_DB: pageturner
      POSTGRES_USER: pageturner
      POSTGRES_PASSWORD: pageturner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "django-insecure-1dqo5xs!^%)j#9qe*g*vi#2af1cfhhtj)_lphp!5xsf8t3m7$1"
      DB_NAME: pageturner
      DB_USER: pageturner
      DB_PASSWORD: pageturner
      DB_HOST: db
      DB_PORT: "5432"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      DEBUG: "True"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: ./backend
    command: sh -c "uv run celery -A config worker --loglevel=info"
    volumes:
      - ./backend:/app
    environment:
      SECRET_KEY: "django-insecure-1dqo5xs!^%)j#9qe*g*vi#2af1cfhhtj)_lphp!5xsf8t3m7$1"
      DB_NAME: pageturner
      DB_USER: pageturner
      DB_PASSWORD: pageturner
      DB_HOST: db
      DB_PORT: "5432"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:


